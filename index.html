<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The Board Room</title>
    <meta name="theme-color" content="#F2F1EB" />
    <meta name="description" content="Your command center — markets, ventures, board of advisors, and the day's brief." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Preload the house typeface (Inter, self-hosted) so first paint already
         has it — no swap flicker. crossorigin is required even same-origin. -->
    <link rel="preload" href="/fonts/inter-var-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- "black" (opaque), NOT "default" and NOT "black-translucent":
         • "default" paints the status bar WHITE with dark glyphs — fine over the
           old light-only app, but it clashes as a white cap over Graphite (dark).
         • "black-translucent" is seamless but this iOS half-applies it: it sizes
           the window below the status bar yet anchors it at the top, leaving a
           dead 59pt letterbox at the BOTTOM.
         "black" keeps the opaque, below-status-bar window (bottom reaches the
         physical screen edge, no letterbox) while painting the bar black with
         white glyphs — seamless with the dark app, readable over light.
         iOS reads this at Add-to-Home-Screen time only: an already-installed
         icon must be deleted and re-added for the change to take. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Board Room" />
    <script>
      // Resolve the room's theme before first paint — no flash, ever.
      // Mirrors resolveTheme() in src/theme.js; keep the two in sync.
      (function () {
        var t = "day";
        try {
          var p = localStorage.getItem("br_theme") || "auto";
          if (p === "day" || p === "night") t = p;
          // Must match resolveTheme() in src/theme.js exactly, or React repaints
          // a different theme after hydration (a flash). matchMedia is
          // authoritative in BOTH directions when present; the sun-based hour
          // fallback is only for browsers without matchMedia.
          else if (window.matchMedia) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "night" : "day";
          else { var h = new Date().getHours(); t = (h >= 19 || h < 7) ? "night" : "day"; }
        } catch (e) {}
        document.documentElement.setAttribute("data-theme", t);
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute("content", t === "night" ? "#000000" : "#F2F1EB");
      })();
    </script>
    <!-- Type: Inter (self-hosted, preloaded above) with the platform stack as
         the cold-cache fallback. One small variable file, same origin. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
