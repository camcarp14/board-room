<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The Board Room</title>
    <meta name="theme-color" content="#F2F1EB" />
    <meta name="description" content="Your command center — markets, ventures, board of advisors, and the day's brief." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- "default", not "black-translucent": on this iOS, translucent mode
         sizes the window below the status bar but anchors it at the top,
         leaving a dead 59pt letterbox at the BOTTOM. Default mode gets the
         window's bottom edge to the physical bottom of the screen.
         iOS reads this at Add-to-Home-Screen time only. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Board Room" />
    <script>
      // Resolve the room's theme before first paint — no flash, ever.
      // Mirrors resolveTheme() in src/theme.js; keep the two in sync.
      (function () {
        var t = "day";
        try {
          var p = localStorage.getItem("br_theme") || "auto";
          if (p === "day" || p === "night") t = p;
          else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) t = "night";
          else { var h = new Date().getHours(); t = (h >= 19 || h < 7) ? "night" : "day"; }
        } catch (e) {}
        document.documentElement.setAttribute("data-theme", t);
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute("content", t === "night" ? "#000000" : "#F2F1EB");
      })();
    </script>
    <!-- SESSION uses the platform's own type (San Francisco on iOS/iPadOS) —
         no webfonts, nothing to download before first paint. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
