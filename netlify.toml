[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Mini Me nightly run — 09:00 UTC ≈ 3–4 AM Chicago depending on DST
[functions."mini-worker"]
  schedule = "0 9 * * *"

# SPA fallback — everything that isn't a function or asset serves index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
